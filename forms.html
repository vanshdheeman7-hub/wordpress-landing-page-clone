<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms learning</title>
    <img src="image.png" alt="image">
</head>
<body>
    <h1>Form Filling</h1> 
    <form action="post">
        <div>
        <label for="username">your username</label>
        <input type="text" id="username" name="username" placeholder="enter your name">
        </div>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <h2>Are you gay??</h2>
        <div>
            <input type="radio" name="are you gay" id="no">
            <label for="no">No</label>

            <input type="radio" id="yes" name="are you gay">
            <label for="yes">Yes</label>
        </div>
        <div>
            <h3> are you a lesbian??</h3>
            <input type="radio" name="are you lesbian" id="no">
            <label for="no">No</label>

            <input type="radio" id="yes" name="are you lesbian">
            <label for="yes">Yes</label>
        </div>
        <div>
            <h3>are you happy</h3>
            <input type="checkbox" name="proud to be" id="unique">
            <label for="unique">proud to be</label>
            <br>
            <input type="checkbox" id="unique">
            <label for="unique">no i am chakka</label>
        </div>
        <div>
            <textarea name="comment" rows="4" cols="30" placeholder="tell something about yourself"></textarea>
        </div>
        <h4>city you live in</h4>
        <div>
            <select name="city" >
                <option value="road pr">road pr</option>
                <option>delhi</option>
                <option> mumbai</option>
                <option >moradabad</option>
            </select>
        </div>
    </form>
</body>
</html>
